<!DOCTYPE html>
<html lang="en">
<head>

      padding: 24px;

    .card {
      max-width: 660px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      border-radius: 28px;
      padding: 38px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    }
    h1 {
      font-size: 46px;
      line-height: 1.05;
      letter-spacing: -0.04em;
      margin: 0 0 18px;
    }
    p {
      color: #cbd5e1;
      line-height: 1.65;
      font-size: 18px;
      margin: 0 0 28px;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #8b5cf6;
      color: white;
      text-decoration: none;
      font-weight: 800;
      padding: 15px 24px;
      border-radius: 999px;
    }

<body>
  <main class="card">
    <h1>Thank you.</h1>
